version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: opsknowledge_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-opsknowledge}
      POSTGRES_USER: ${POSTGRES_USER:-opsuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-opspassword}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-opsuser} -d ${POSTGRES_DB:-opsknowledge}"]
      interval: 10s
      timeout: 5s
      retries: 5

  chromadb:
    image: chromadb/chroma:0.5.23
    container_name: opsknowledge_chroma
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      ANONYMIZED_TELEMETRY: "false"

  backend:
    build: ./backend
    container_name: opsknowledge_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      CHROMA_HOST: chromadb
      CHROMA_PORT: 8000
    depends_on:
      postgres:
        condition: service_healthy
      chromadb:
        condition: service_started
    volumes:
      - ./backend:/app
    command: sh -c "python scripts/create_tables.py && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build: ./frontend
    container_name: opsknowledge_frontend
    ports:
      - "8501:8501"
    environment:
      BACKEND_URL: http://backend:8000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app

volumes:
  postgres_data:
  chroma_data:
