# OpsKnowledge Agent Lite — full stack
#
# Ports（host → container）:
#   frontend : 8501 → 8501  (React UI — start here)
#   backend  : 8000 → 8000  (FastAPI — http://localhost:8000/docs)
#   postgres : 5432 → 5432  (Postgres 16 + pgvector)
#   ollama   : 11434 → 11434 (local LLM server)
#
# Persistence: postgres_data named volume survives compose restarts.
# Service hostnames inside the compose network: postgres / ollama / backend / frontend.

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: opsknowledge_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-opsknowledge}
      POSTGRES_USER: ${POSTGRES_USER:-opsuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-opspassword}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-opsuser} -d ${POSTGRES_DB:-opsknowledge}" ]
      interval: 5s
      timeout: 5s
      retries: 10

  ollama:
    image: ollama/ollama
    container_name: opsknowledge_ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: [ "CMD", "ollama", "list" ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  backend:
    build: ./backend
    container_name: opsknowledge_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    # compose network 內以 service 名互連，覆蓋 .env 預設的 localhost
    environment:
      POSTGRES_HOST: postgres
      # Inside Docker, use the compose service hostname for the bundled Ollama.
      OLLAMA_BASE_URL: ${DOCKER_OLLAMA_BASE_URL:-http://ollama:11434}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: sh -c "python scripts/create_tables.py && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    healthcheck:
      test:
        - "CMD-SHELL"
        - "python3 -c \"import urllib.request,sys; urllib.request.urlopen('http://localhost:8000/health',timeout=2)\" || exit 1"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  frontend:
    build: ./frontend
    container_name: opsknowledge_frontend
    restart: unless-stopped
    ports:
      - "8501:8501"
    environment:
      BACKEND_URL: http://backend:8000
    # 以 Vite dev server（含 HMR）執行，改前端原始碼即時反映、不需重 build dist
    command: npm run dev
    # frontend 沒有 healthcheck 需求；它本身就是給人按的 UI
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./frontend:/app
      # 匿名 volume 保留容器內自身的 node_modules（正確的原生 binding），避免被 host 覆蓋
      - /app/node_modules

volumes:
  postgres_data:
  ollama_data:
