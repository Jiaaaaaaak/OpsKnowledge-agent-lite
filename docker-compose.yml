# OpsKnowledge Agent Lite — 4 服務全套 stack
#
# Ports（host → container）:
#   frontend : 8501 → 8501  (React UI — start here)
#   backend  : 8000 → 8000  (FastAPI — http://localhost:8000/docs)
#   postgres : 5432 → 5432  (Postgres 16)
#   chromadb : 8001 → 8000  (Chroma 監聽 container 內 8000；host 對外用 8001 避開 backend)
#
# Persistence: postgres_data / chroma_data named volumes 跨 compose 重啟保留資料。
# Service hostnames inside the compose network: postgres / chromadb / backend / frontend.

services:
  postgres:
    image: postgres:16-alpine
    container_name: opsknowledge_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-opsknowledge}
      POSTGRES_USER: ${POSTGRES_USER:-opsuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-opspassword}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-opsuser} -d ${POSTGRES_DB:-opsknowledge}"]
      interval: 5s
      timeout: 5s
      retries: 10

  chromadb:
    image: chromadb/chroma:0.5.23
    container_name: opsknowledge_chroma
    restart: unless-stopped
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      ANONYMIZED_TELEMETRY: "false"
    # chromadb image 有 python3；用 stdlib 打 /api/v1/heartbeat 即可，不需 curl / wget
    healthcheck:
      test:
        - "CMD-SHELL"
        - "python3 -c \"import urllib.request,sys; urllib.request.urlopen('http://localhost:8000/api/v1/heartbeat',timeout=2)\" || exit 1"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build: ./backend
    container_name: opsknowledge_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    # compose network 內以 service 名互連，覆蓋 .env 預設的 localhost
    environment:
      POSTGRES_HOST: postgres
      CHROMA_HOST: chromadb
      CHROMA_PORT: 8000
      # Inside Docker, localhost points at the backend container, not the host.
      # Use DOCKER_OLLAMA_BASE_URL to override for containerized Ollama.
      OLLAMA_BASE_URL: ${DOCKER_OLLAMA_BASE_URL:-http://host.docker.internal:11434}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: sh -c "python scripts/create_tables.py && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    healthcheck:
      test:
        - "CMD-SHELL"
        - "python3 -c \"import urllib.request,sys; urllib.request.urlopen('http://localhost:8000/health',timeout=2)\" || exit 1"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  frontend:
    build: ./frontend
    container_name: opsknowledge_frontend
    restart: unless-stopped
    ports:
      - "8501:8501"
    environment:
      BACKEND_URL: http://backend:8000
    # frontend 沒有 healthcheck 需求；它本身就是給人按的 UI
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./frontend:/app

volumes:
  postgres_data:
  chroma_data:
